name: bioinformatics_omics
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Python
  - python=3.10
  - pip

  # Core scientific stack
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - seaborn>=0.12
  - statsmodels>=0.14

  # Deep learning
  - pytorch>=2.0
  - cpuonly            # remove if GPU available; replace with cudatoolkit

  # Bioinformatics
  - bioconductor-deseq2
  - bioconductor-minfi
  - bioconductor-champ
  - bioconductor-dmrcate
  - bioconductor-limma
  - bioconductor-missmethyl
  - bioconductor-enhancedvolcano
  - bioconductor-clusterprofiler
  - bioconductor-org.hs.eg.db
  - subread            # featureCounts
  - star>=2.7
  - trim-galore
  - fastqc
  - multiqc
  - samtools
  - r-base>=4.3
  - r-tidyverse
  - r-pheatmap
  - r-rcolorbrewer
  - r-ggplot2

  - pip:
    - shap>=0.42
    - mofapy2>=0.7      # MOFA+ for factor analysis
    - pydeseq2>=0.4     # optional Python DESeq2 port
    - umap-learn
    - plotly
    - jupyterlab
